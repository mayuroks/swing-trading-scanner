spring.application.name=demo
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:trading}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:mysecret}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=-1

# Shows the exact SQL being executed
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
# Shows the values being bound to the ? placeholders
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE

logging.level.org.springframework.jdbc=DEBUG
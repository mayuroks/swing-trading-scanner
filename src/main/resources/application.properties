spring.application.name=demo
server.port=${PORT:8080}
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:trading}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:mysecret}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=-1

# Kite API config — Railway sets KITE_API_KEY and KITE_API_SECRET
kite.api.key=${KITE_API_KEY:}
kite.api.secret=${KITE_API_SECRET:}

# Telegram bot config — Railway sets TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.chat.id=${TELEGRAM_CHAT_ID:}